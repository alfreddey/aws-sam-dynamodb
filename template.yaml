AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DynamoDB orders table with two GSIs

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment. Used to suffix the table name (orders-dev / orders-prod).

Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub orders-${Environment}
      BillingMode: PAY_PER_REQUEST
      TableClass: STANDARD_INFREQUENT_ACCESS
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
        - AttributeName: CustomerId
          AttributeType: S
        - AttributeName: Status
          AttributeType: S

      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH

      GlobalSecondaryIndexes:
        - IndexName: CustomerId-index
          KeySchema:
            - AttributeName: CustomerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: Status-index
          KeySchema:
            - AttributeName: Status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

      Tags:
        - Key: Project
          Value: aws-sam-dynamodb
        - Key: Environment
          Value: !Ref Environment

Outputs:
  TableName:
    Description: Name of the deployed DynamoDB table.
    Value: !Ref OrdersTable
  TableArn:
    Description: ARN of the deployed DynamoDB table.
    Value: !GetAtt OrdersTable.Arn
